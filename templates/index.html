<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonicSearch AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ───────────────────────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #1f1f1f;
      --accent:    #c8f057;   /* lima ácido — el único color */
      --text:      #e8e8e8;
      --muted:     #555;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
      --radius:    4px;
      --transition: 180ms ease;
    }

    /* ── RESET ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LAYOUT ───────────────────────────────────────────────────────────── */
    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .logo-sub {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      padding: 3rem 2.5rem;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── SEARCH BOX ───────────────────────────────────────────────────────── */
    .search-wrapper {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .search-wrapper:focus-within {
      border-color: var(--accent);
    }

    #query-input {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 400;
      padding: 0.9rem 1.1rem;
      caret-color: var(--accent);
    }
    #query-input::placeholder { color: var(--muted); }

    #search-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      padding: 0.9rem 1.4rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity var(--transition);
      white-space: nowrap;
    }
    #search-btn:hover { opacity: 0.85; }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── ESTADO ───────────────────────────────────────────────────────────── */
    #status-bar {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 2rem;
      min-height: 1.1em;
      letter-spacing: 0.04em;
    }
    #status-bar.running { color: var(--accent); }
    #status-bar.error   { color: #ff5f5f; }

    /* ── PLAN TRACE (acordeón) ────────────────────────────────────────────── */
    #plan-trace {
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .trace-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1rem;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .trace-header:hover { background: #161616; }
    .trace-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .trace-weights {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-left: auto;
    }
    .trace-chevron {
      font-size: 0.6rem;
      color: var(--muted);
      transition: transform var(--transition);
    }
    .trace-chevron.open { transform: rotate(180deg); }
    #plan-body {
      display: none;
      padding: 1rem;
      background: #0d0d0d;
    }
    #plan-body.open { display: block; }
    #plan-json {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: #888;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.7;
    }

    /* ── RESULTADOS ───────────────────────────────────────────────────────── */
    #results-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1rem;
      display: none;
    }

    #results-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 250ms ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    .result-rank {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    .result-meta { min-width: 0; }
    .result-title {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .result-artist {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }
    .result-tags {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.35rem;
      flex-wrap: wrap;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
    }
    .tag.genre { border-color: #2a2a2a; color: #777; }

    .result-score {
      text-align: right;
    }
    .score-bar-wrap {
      width: 60px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }
    .score-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 400ms ease;
    }
    .score-num {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* ── EMPTY / SKELETON ─────────────────────────────────────────────────── */
    .skeleton {
      height: 72px;
      background: linear-gradient(90deg, var(--surface) 25%, #161616 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty-state {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      padding: 2rem 0;
      text-align: center;
    }

    /* ── FOOTER ───────────────────────────────────────────────────────────── */
    footer {
      padding: 1rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-mono {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    #health-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    #health-dot.ok  { background: var(--accent); }
    #health-dot.err { background: #ff5f5f; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header>
  <span class="logo">SonicSearch</span>
  <span class="logo-sub">Multimodal · v0.1</span>
</header>

<!-- ── MAIN ────────────────────────────────────────────────────────────────── -->
<main>

  <!-- Search box -->
  <div class="search-wrapper">
    <input
      id="query-input"
      type="text"
      placeholder="Describe una canción: mood, ritmo, instrumentos, temática..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="search-btn">Buscar</button>
  </div>

  <!-- Status bar -->
  <div id="status-bar"></div>

  <!-- Plan trace (acordeón) -->
  <div id="plan-trace">
    <div class="trace-header" id="trace-toggle">
      <span class="trace-label">▸ Traza del planificador</span>
      <span class="trace-weights" id="trace-weights"></span>
      <span class="trace-chevron" id="trace-chevron">▼</span>
    </div>
    <div id="plan-body">
      <pre id="plan-json"></pre>
    </div>
  </div>

  <!-- Results label -->
  <div id="results-label">Resultados</div>

  <!-- Results -->
  <div id="results-list"></div>

</main>

<!-- ── FOOTER ──────────────────────────────────────────────────────────────── -->
<footer>
  <span class="footer-mono">
    <span id="health-dot"></span>
    <span id="health-text">comprobando motor...</span>
  </span>
  <span class="footer-mono">Plan-and-Execute · Late Fusion RRF</span>
</footer>

<!-- ── SCRIPT ──────────────────────────────────────────────────────────────── -->
<script>
  const input     = document.getElementById('query-input');
  const btn       = document.getElementById('search-btn');
  const statusBar = document.getElementById('status-bar');
  const planTrace = document.getElementById('plan-trace');
  const planBody  = document.getElementById('plan-body');
  const planJson  = document.getElementById('plan-json');
  const traceWeights = document.getElementById('trace-weights');
  const traceChevron = document.getElementById('trace-chevron');
  const resultsList  = document.getElementById('results-list');
  const resultsLabel = document.getElementById('results-label');

  // ── Health check al cargar ───────────────────────────────────────────────
  (async () => {
    const dot  = document.getElementById('health-dot');
    const text = document.getElementById('health-text');
    try {
      const r = await fetch('/health');
      const d = await r.json();
      if (d.ready) {
        dot.className  = 'ok';
        text.textContent = `Motor listo · ${d.songs} canciones · ${d.lyrics_vectors} vectores lírica · ${d.audio_vectors} vectores audio`;
      } else {
        dot.className  = 'err';
        text.textContent = `Motor no listo: ${d.error || 'error desconocido'}`;
      }
    } catch {
      dot.className  = 'err';
      text.textContent = 'No se pudo conectar con el servidor';
    }
  })();

  // ── Toggle traza ─────────────────────────────────────────────────────────
  document.getElementById('trace-toggle').addEventListener('click', () => {
    const open = planBody.classList.toggle('open');
    traceChevron.classList.toggle('open', open);
  });

  // ── Búsqueda ─────────────────────────────────────────────────────────────
  async function doSearch() {
    const query = input.value.trim();
    if (!query) return;

    // Estado: cargando
    btn.disabled = true;
    setStatus('running', '● buscando...');
    showSkeletons();
    planTrace.style.display = 'none';
    resultsLabel.style.display = 'none';

    try {
      const res  = await fetch('/search', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ query }),
      });
      const data = await res.json();

      if (data.error) {
        setStatus('error', `✕ ${data.error}`);
        resultsList.innerHTML = '';
        return;
      }

      // Mostrar traza del planificador
      renderPlan(data);

      // Mostrar resultados
      renderResults(data.results);

      const n = data.results.length;
      const from = `lírica:${data.n_lyrics ?? '—'} · audio:${data.n_audio ?? '—'}`;
      setStatus('', `${n} resultado${n !== 1 ? 's' : ''} · ${from}`);

    } catch (err) {
      setStatus('error', `✕ Error de red: ${err.message}`);
      resultsList.innerHTML = '';
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Helpers de UI ────────────────────────────────────────────────────────
  function setStatus(cls, msg) {
    statusBar.className = cls;
    statusBar.textContent = msg;
  }

  function showSkeletons(n = 5) {
    resultsList.innerHTML = Array.from({ length: n })
      .map(() => `<div class="skeleton"></div>`)
      .join('');
  }

  function renderPlan(data) {
    if (!data.plan) return;
    planTrace.style.display = 'block';
    planJson.textContent = JSON.stringify(data.plan, null, 2);
    const lw = data.lyric_weight != null ? (data.lyric_weight * 100).toFixed(0) : '—';
    const aw = data.audio_weight  != null ? (data.audio_weight  * 100).toFixed(0) : '—';
    traceWeights.textContent = `lírica ${lw}% · audio ${aw}%`;
  }

  function renderResults(results) {
    resultsList.innerHTML = '';

    if (!results || results.length === 0) {
      resultsList.innerHTML = '<div class="empty-state">Sin resultados para esta búsqueda.</div>';
      resultsLabel.style.display = 'none';
      return;
    }

    resultsLabel.style.display = 'block';

    results.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.animationDelay = `${i * 60}ms`;

      const pct   = r.score_pct ?? (r.score * 100).toFixed(1);
      const width = Math.min(100, pct);
      const tags  = [r.tag, r.year].filter(Boolean);

      card.innerHTML = `
        <div class="result-rank">${String(i + 1).padStart(2, '0')}</div>
        <div class="result-meta">
          <div class="result-title">${esc(r.title)}</div>
          <div class="result-artist">${esc(r.artist)}</div>
          <div class="result-tags">
            ${tags.map(t => `<span class="tag genre">${esc(t)}</span>`).join('')}
          </div>
        </div>
        <div class="result-score">
          <div class="score-bar-wrap">
            <div class="score-bar" style="width:${width}%"></div>
          </div>
          <div class="score-num">${pct}%</div>
        </div>
      `;

      resultsList.appendChild(card);
    });
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>

</body>
</html>
